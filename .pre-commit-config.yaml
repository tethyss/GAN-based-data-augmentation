repos:
  - repo: local
    hooks:
      - id: public-repository-guard
        name: Block confidential data and oversized artifacts
        entry: python scripts/check_public_repo.py
        language: system
        pass_filenames: true

      - id: ruff-check
        name: Ruff lint
        entry: ruff check --force-exclude
        exclude: ^legacy/
        language: system
        types: [python]

      - id: ruff-format
        name: Ruff format check
        entry: ruff format --check --force-exclude
        exclude: ^legacy/
        language: system
        types: [python]
