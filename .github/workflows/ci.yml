name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Enforce public repository boundary
        run: python scripts/check_public_repo.py --all

      - name: Parse maintained Python source
        run: python -m compileall -q src scripts
